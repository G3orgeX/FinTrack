<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <title>FinTrack | Ingresos</title>
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <h1>FinTrack</h1>
            <p>Controla tus finanzas</p>
        </div>
        <nav class="navbar" aria-label="Navegación principal">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="./Ingresos.html" class="active">Ingresos</a></li>
                <li><a href="./Categorias.html">Categorias</a></li>
                <li><a href="./Balances.html">Balances</a></li>
                <li><a href="./AhorrosInv.html">Ahorros e Inversiones</a></li>
                <li><a href="./Reportes.html">Reportes</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <section class="panel">
            <h2>Cargar transacción</h2>
            <form id="formTransaccion" class="form-panel">
                <input type="hidden" id="transaccionId" name="id">

                <label for="transaccionDescripcion">Descripción</label>
                <input type="text" id="transaccionDescripcion" name="descripcion" placeholder="Ej. Pago de salario" required>

                <label for="transaccionMonto">Monto total de la cuota</label>
                <input type="number" id="transaccionMonto" name="monto" min="0" step="0.01" required>

                <label for="transaccionFecha">Fecha</label>
                <input type="date" id="transaccionFecha" name="fecha" required>

                <label for="transaccionCategoria">Categoría</label>
                <select id="transaccionCategoria" name="categoria" required></select>

                <label for="transaccionEsCuota">
                    <input type="checkbox" id="transaccionEsCuota" name="esCuota">
                    ¿Es una operación con cuotas?
                </label>

                <div id="cuotasContainer" hidden>
                    <label for="transaccionCantidadCuotas">Cantidad de cuotas</label>
                    <input type="number" id="transaccionCantidadCuotas" name="cantCuotas" min="1" step="1" value="1">
                </div>

                <div class="actions-cell">
                    <button type="submit" id="submitTransaccion">Guardar transacción</button>
                    <button type="button" id="cancelarEdicionTransaccion" class="secondary-button" hidden>Cancelar</button>
                </div>
            </form>
        </section>

        <section class="panel">
            <h2>Transacciones registradas</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Descripción</th>
                        <th>Monto</th>
                        <th>ValorCuota</th>
                        <th>Fecha</th>
                        <th>Categoría</th>
                        <th>Cuotas</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="transaccionesTablaBody"></tbody>
            </table>
        </section>
    </main>

    <script type="module" src="../js/Services/IngresoService.js"></script>
</body>
</html>
